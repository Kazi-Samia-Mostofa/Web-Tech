<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link rel="stylesheet" href="style.css">
</head>
<body>
        <h1>Welcome to Pental Shop</h1>
        <h3>About This Lab</h3>
        <p>In this lab, you will learn basic HTML structure, formatting text, creating<br>simple tables, and using forms for input.</p>
        
        <table id="table1">
            <tr>
                <th>Item Name</th>
                <th>Quantity</th>
                <th>Status</th>
            </tr>
            <tr>
                <td>Pencils</td>
                <td>100</td>
                <td>In stock</td>
            </tr>
            <tr>
                <td>Notebooks</td>
                <td>50</td>
                <td>Low stock</td>
            </tr>
            <tr>
                <td>Markers</td>
                <td>15</td>
                <td>In stock</td>
            </tr>
        </table>
        
        <div id="info">
            <h2>Contact Information</h2>
        <form>
            <table id="table2">
                <tr>
                    <td>Name</td>
                    <td><input type="text" name="name" id="n"></td>
                </tr>
                 <tr>
                    <td>Email</td>
                    <td><input type="email" name="email" id="e"></td>
                </tr>
                 <tr>
                    <td>Message</td>
                    <td><input type="text-area" name="message" id="m"></td>
                </tr>
                
            </table>
            <button type="button">Submit</button>
        </form>
        </div>

        
    </body>
</html>
